<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Калькулятор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Мій Калькулятор</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm mt-4">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Реєстрація</h2>
                        <form>
                            <div class="mb-3">
                                <label for="regName" class="form-label">Ім'я</label>
                                <input type="text" class="form-control" id="regName" placeholder="Іван Іванов" required>
                            </div>
                            <div class="mb-3">
                                <label for="regEmail" class="form-label">Email адреса</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="regPassword" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="regPassword" required>
                            </div>
                            <div class="mb-3">
                                <label for="regPasswordConfirm" class="form-label">Підтвердіть пароль</label>
                                <input type="password" class="form-control" id="regPasswordConfirm" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="regGender" class="form-label">Стать</label>
                                    <select class="form-select" id="regGender" required>
                                        <option value="" selected disabled>Оберіть...</option>
                                        <option value="male">Чоловіча</option>
                                        <option value="female">Жіноча</option>
                                        <option value="other">Інша</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="regDate" class="form-label">Дата народження</label>
                                    <input type="date" class="form-control" id="regDate" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 mt-3">Зареєструватися</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">© 2026 Лабораторна робота №1. Усі права захищено.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
